# docker/nginx/security_headers.conf
# Cabeceras HTTP de seguridad centralizadas para FitPro.
#
# ¿Por qué un archivo separado?
# ─────────────────────────────────────────────────────────────────────────
# En Nginx, la directiva add_header NO se hereda entre bloques location.
# Si el bloque server{} tiene add_header y un bloque location{} también
# tiene su propio add_header, las cabeceras del bloque server se IGNORAN
# para ese location (no se combinan, se reemplazan).
#
# Solución: centralizar todas las cabeceras en este archivo e incluirlo
# con "include /etc/nginx/conf.d/security_headers.conf;" en cada location
# que responda directamente al cliente.
# ─────────────────────────────────────────────────────────────────────────

# ── Protección contra Clickjacking ────────────────────────────────────
# Impide que la página sea incrustada en un <iframe> de otro origen.
add_header X-Frame-Options "DENY" always;

# ── Protección contra MIME Sniffing ──────────────────────────────────
# Fuerza al navegador a respetar el Content-Type declarado por el servidor.
add_header X-Content-Type-Options "nosniff" always;

# ── Filtro XSS del navegador ──────────────────────────────────────────
# Activa el filtro XSS en navegadores legacy.
add_header X-XSS-Protection "1; mode=block" always;

# ── Control de Referrer ───────────────────────────────────────────────
# Envía solo el origen en peticiones cross-origin, URL completa en same-origin.
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ── Permisos de APIs del navegador ────────────────────────────────────
# Deshabilita APIs sensibles del navegador que la app no necesita.
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# ── Content Security Policy (CSP) ────────────────────────────────────
# Controla qué recursos puede cargar el navegador.
#
# Recursos externos que usa FitPro:
#   Bootstrap CSS/JS   → https://cdn.jsdelivr.net
#   Bootstrap Icons    → https://cdn.jsdelivr.net (fuentes .woff2)
#   Chart.js           → https://cdn.jsdelivr.net
#   Google Fonts CSS   → https://fonts.googleapis.com
#   Google Fonts WOFF2 → https://fonts.gstatic.com
#
# connect-src: se agrega cdn.jsdelivr.net para que los DevTools del navegador
# puedan cargar los source maps (.map) de Bootstrap y Chart.js sin errores CSP.
# Esto no representa un riesgo de seguridad porque los .map son solo para debug
# y no se cargan en producción normal, solo cuando DevTools está abierto.
#
# Notas sobre 'unsafe-inline':
#   El frontend usa inline event handlers (onclick="...") y bloques <style>
#   en los HTML. Eliminar esta necesidad requeriría migrar handlers a
#   addEventListener y mover estilos inline a main.css.
#
# Notas sobre data: en img-src:
#   main.css usa data:image/svg+xml para el ícono del select personalizado.
add_header Content-Security-Policy "
  default-src 'self';
  script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
  style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com;
  font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net;
  img-src 'self' data: blob:;
  connect-src 'self' https://cdn.jsdelivr.net;
  frame-ancestors 'none';
  object-src 'none';
  base-uri 'self';
" always;