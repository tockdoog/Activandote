# docker/nginx/nginx.conf
# Configuración principal del servidor Nginx para FitPro.
# Sirve el frontend (archivos estáticos) y proxea /api/ al contenedor backend.
#
# ARQUITECTURA:
#   Navegador → Nginx (puerto 80) → Archivos estáticos  (CSS, JS, HTML)
#                                 → Backend FastAPI      (/api/v1/...)
#                                 → Health check         (/health)
#
# POR QUÉ GZIP ESTÁ DESACTIVADO:
#   Con gzip on, nginx no conoce el tamaño final del archivo comprimido
#   antes de enviarlo, por lo que usa Transfer-Encoding: chunked.
#   En Docker sobre WSL2, esa codificación chunked se corrompe a nivel
#   de red, causando ERR_INVALID_CHUNKED_ENCODING en el navegador.
#   Al desactivar gzip, nginx calcula Content-Length correctamente y
#   envía las respuestas sin chunked encoding.
#
# IMPORTANTE — Herencia de add_header en Nginx:
#   Los bloques location NO heredan las directivas add_header del bloque server.
#   Por eso las cabeceras de seguridad están en security_headers.conf y se
#   incluyen explícitamente en cada location con "include".

server {
    listen 80;

    # Responde a cualquier hostname o IP: localhost, 127.0.0.1, 192.168.X.X, etc.
    server_name _;

    # Directorio raíz donde Nginx busca los archivos estáticos del frontend
    root /usr/share/nginx/html;
    index index.html;

    # Charset por defecto para respuestas de texto
    charset utf-8;

    # ─────────────────────────────────────────────────────────────────────
    # CORRECCIÓN ERR_INVALID_CHUNKED_ENCODING
    # sendfile off → nginx lee archivos en buffers de memoria en lugar de
    #               usar el syscall del kernel, evitando corrupción en WSL2.
    # tcp_nopush off → desactiva el almacenamiento de paquetes TCP antes
    #                  de enviarlos; depende de sendfile y debe ir junto.
    # tcp_nodelay on → envía los datos inmediatamente sin buffering de Nagle.
    # gzip off → CRÍTICO: con gzip activo nginx usa Transfer-Encoding: chunked
    #            porque no conoce el tamaño final comprimido. Ese chunked se
    #            corrompe en Docker/WSL2. Desactivarlo fuerza Content-Length.
    # ─────────────────────────────────────────────────────────────────────
    sendfile    off;
    tcp_nopush  off;
    tcp_nodelay on;
    gzip        off;

    # ─────────────────────────────────────────────────────────────────────
    # FAVICON — Respuesta vacía 204 para evitar 404 en el log y posibles
    # redirecciones no deseadas al index.html.
    # ─────────────────────────────────────────────────────────────────────
    location = /favicon.ico {
        try_files $uri =204;
        access_log    off;
        log_not_found off;
    }

    # ─────────────────────────────────────────────────────────────────────
    # CHROME DEVTOOLS — Silenciar el endpoint que Chrome solicita
    # automáticamente y genera ruido en los logs.
    # ─────────────────────────────────────────────────────────────────────
    location = /.well-known/appspecific/com.chrome.devtools.json {
        return 204;
        access_log    off;
        log_not_found off;
    }

    # ─────────────────────────────────────────────────────────────────────
    # ACTIVOS ESTÁTICOS — CSS, JS, Imágenes, Fuentes
    # Caché de 7 días; los assets cambian poco entre despliegues.
    # ─────────────────────────────────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot|webp|avif)$ {
        # Cabeceras de seguridad (no se heredan del server, deben incluirse)
        include /etc/nginx/conf.d/security_headers.conf;

        # Caché agresiva de 7 días en el navegador
        expires 7d;
        add_header Cache-Control "public, max-age=604800";

        # 204 si el archivo no existe: evita redirigir al index.html
        try_files $uri =204;
    }

    # ─────────────────────────────────────────────────────────────────────
    # SPA — Enrutamiento de la aplicación de una sola página.
    # Sin caché para HTML: el navegador siempre obtiene la versión fresca.
    # ─────────────────────────────────────────────────────────────────────
    location / {
        # Cabeceras de seguridad
        include /etc/nginx/conf.d/security_headers.conf;

        # Sin caché para HTML: después de un despliegue el navegador
        # debe obtener el HTML actualizado
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";

        # Fallback SPA: archivo → directorio → index.html
        try_files $uri $uri/ /index.html;
    }

    # ─────────────────────────────────────────────────────────────────────
    # PROXY INVERSO — /api/ → Backend FastAPI
    # proxy_buffering off: nginx actúa como túnel transparente para evitar
    # fragmentación incorrecta de respuestas JSON del backend.
    # ─────────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;

        # Cabeceras para que FastAPI reciba el host y la IP real del cliente
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cabeceras para soporte de WebSockets
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeouts generosos para peticiones largas (Excel, PDF)
        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # Tamaño máximo del cuerpo de la petición para subida de archivos
        client_max_body_size   10M;

        # Sin buffering: evita fragmentación chunked incorrecta del backend
        proxy_buffering         off;
        proxy_request_buffering off;
    }

    # ─────────────────────────────────────────────────────────────────────
    # HEALTH CHECK — Endpoint de salud del sistema.
    # access_log off: evita spam en los logs por verificaciones frecuentes.
    # ─────────────────────────────────────────────────────────────────────
    location = /health {
        proxy_pass       http://backend:8000/health;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering  off;
        access_log       off;
    }

    # ─────────────────────────────────────────────────────────────────────
    # SWAGGER / REDOC — Documentación interactiva de la API.
    # Solo disponible cuando DEBUG=True en el backend.
    # ─────────────────────────────────────────────────────────────────────
    location /docs {
        proxy_pass       http://backend:8000/docs;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering  off;
    }

    location /redoc {
        proxy_pass       http://backend:8000/redoc;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering  off;
    }

    location = /openapi.json {
        proxy_pass       http://backend:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_buffering  off;
    }

    # ─────────────────────────────────────────────────────────────────────
    # BLOQUEO DE ARCHIVOS SENSIBLES
    # ─────────────────────────────────────────────────────────────────────

    # Archivos ocultos: .env, .git, .htaccess, etc.
    location ~ /\. {
        deny all;
        return 404;
    }

    # Archivos de configuración y base de datos
    location ~* \.(env|db|sqlite|sqlite3|log|conf|ini|cfg|bak|sql)$ {
        deny all;
        return 404;
    }

    # ─────────────────────────────────────────────────────────────────────
    # PÁGINAS DE ERROR — Solo 5xx van al index.html.
    # El 404 NO redirige al index para evitar que assets faltantes devuelvan
    # el HTML completo.
    # ─────────────────────────────────────────────────────────────────────
    error_page 500 502 503 504 /index.html;
}